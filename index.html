<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Royal Chess+ | Strategy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
</head>
<body class="dark-mode">

    <div id="splash-screen">
        <div class="logo-animation">
            <h1 class="royal-text">CHESS<span>+</span></h1>
        </div>
    </div>

    <div id="name-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="startAsGuest()">❌</span>
            <div class="input-area">
                <input type="text" id="username-input" placeholder='{"NAME = SEM ALTMEN"}'>
                <button onclick="saveName()">SAVE NAME</button>
                <p class="guest-link" onclick="startAsGuest()">Or Play As Guest</p>
            </div>
        </div>
    </div>

    <header>
        <div class="theme-wrapper">
            <span class="label">Light</span>
            <div class="switch-box" onclick="toggleTheme()">
                <div id="switch-dot"></div>
            </div>
            <span class="label">Dark</span>
        </div>

        <div id="profile-container" onclick="openStats()">
            <div id="profile-logo" class="colorful-circle">G</div>
        </div>
    </header>

    <div id="main-menu" class="container">
        <div id="board" style="width: 400px; margin: 20px auto;"></div>

        <div class="options-container">
            <div class="option-box" id="comp-box">
                <button class="main-btn" onclick="showLevels()">COMPUTER +</button>
                <div id="levels" class="hidden">
                    <span onclick="setGame('easy')">EASY</span>
                    <span onclick="setGame('medium')">MEDIUM</span>
                    <span onclick="setGame('hard')">HARD</span>
                </div>
            </div>

            <div class="option-box">
                <button class="main-btn" onclick="setGame('friend')">WITH FRIEND</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
