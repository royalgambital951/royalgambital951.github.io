<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Gambit</title>

<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>
</head>
<body>

<!-- Splash -->
<div id="splash">
    <h1>Royal Gambit</h1>
</div>

<!-- Header -->
<header>
    <div class="logo">Royal Gambit</div>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
</header>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <p onclick="closeMenu()">Close ✖</p>
    <p>Home</p>
    <p>About</p>
</div>

<main>

<!-- Game Grid -->
<section id="gameGrid" class="grid">
    <div class="card" onclick="openGame('tic')">Tic Tac Toe</div>
    <div class="card" onclick="openGame('snake')">Snake</div>
</section>

<!-- Game Area -->
<section id="gameArea" class="hidden">
    <div class="topbar">
        <button onclick="goBack()">Back</button>
        <button onclick="restartGame()">Restart</button>
    </div>
    <div id="gameContainer"></div>
</section>

</main>

<footer>
<p>© 2025 Royal Gambit</p>
</footer>

</body>
</html>
