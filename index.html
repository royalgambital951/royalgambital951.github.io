<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Gambit</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="Royal Gambit Logo">
  </div>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <nav id="nav">
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<h2>Select Game</h2>

<div class="game-buttons">
  <button onclick="showGame('sliding')">Sliding Puzzle</button>
  <button onclick="showGame('memory')">Memory Game</button>
  <button onclick="showGame('tictactoe')">Tic Tac Toe</button>
</div>

<!-- SLIDING PUZZLE -->
<div id="sliding" class="game-section">
  <h3>Sliding Puzzle</h3>
  <p>Moves: <span id="moves">0</span> | Time: <span id="time">0</span>s</p>
  <div class="grid" id="grid"></div>
  <button onclick="initPuzzle()">Restart</button>
</div>

<!-- MEMORY GAME -->
<div id="memory" class="game-section">
  <h3>Memory Game</h3>
  <div class="grid" id="memoryGrid"></div>
  <button onclick="startMemory()">Restart</button>
</div>

<!-- TIC TAC TOE -->
<div id="tictactoe" class="game-section">
  <h3>Tic Tac Toe</h3>
  <div class="grid" id="ttt"></div>
  <p id="tttStatus"></p>
  <button onclick="resetTTT()">Restart</button>
</div>

<section id="about">
  <h2>About Us</h2>
  <p>Royal Gambit is a professional classical gaming platform built with elegance and modern design.</p>
</section>

<footer id="contact">
  <p><b>Address:</b> Ajmer Kishangarh, Rajasthan, India</p>
  <p><b>Contact:</b> +91 98765 43210</p>
</footer>

<script src="script.js"></script>
</body>
</html>
