<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Gambit</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f4f6f9;
text-align:center;
color:#222;
transition:0.3s;
}

header{
background:white;
padding:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
position:relative;
}

.site-name{
font-family:'Playfair Display',serif;
font-size:28px;
font-weight:700;
}

.theme-btn{
position:absolute;
right:20px;
top:25px;
padding:8px 16px;
border:none;
border-radius:20px;
background:#2c3e50;
color:white;
cursor:pointer;
}

section{
padding:40px 20px;
}

.games button{
margin:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#2c3e50;
color:white;
cursor:pointer;
}

.game-area{
display:none;
margin-top:20px;
}

.active{
display:block;
}

.board{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
max-width:300px;
margin:20px auto;
}

.tile{
background:white;
padding:25px;
font-size:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
}

footer{
background:#111;
color:white;
padding:25px;
}

.dark{
background:#1e1e1e;
color:white;
}

.dark header,
.dark .tile{
background:#2c2c2c;
color:white;
}
</style>
</head>

<body>

<header>
<div class="site-name">Royal Gambit</div>
<button class="theme-btn" onclick="toggleTheme()">🌙</button>
</header>

<section class="games">
<h2>Select Game</h2>

<button onclick="showGame('puzzle')">Sliding Puzzle</button>
<button onclick="showGame('tictactoe')">Tic Tac Toe</button>
<button onclick="showGame('memory')">Memory Game</button>

<!-- Sliding Puzzle -->
<div id="puzzle" class="game-area active">
<h3>Sliding Puzzle</h3>
<div class="board" id="puzzleBoard"></div>
<button onclick="initPuzzle()">Restart</button>
</div>

<!-- Tic Tac Toe -->
<div id="tictactoe" class="game-area">
<h3>Tic Tac Toe</h3>
<div class="board" id="tttBoard"></div>
<p id="tttStatus"></p>
</div>

<!-- Memory Game -->
<div id="memory" class="game-area">
<h3>Memory Game</h3>
<div class="board" id="memoryBoard"></div>
</div>

</section>

<footer>
<p>Address: Ajmer Kishangarh, Rajasthan, India</p>
<p>Contact: +91 98765 43210</p>
</footer>

<script>

function toggleTheme(){
document.body.classList.toggle("dark");
}

function showGame(id){
document.querySelectorAll(".game-area").forEach(g=>g.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* Sliding Puzzle */
function initPuzzle(){
const board=document.getElementById("puzzleBoard");
board.innerHTML="";
let nums=[1,2,3,4,5,6,7,8,""];
nums.sort(()=>Math.random()-0.5);
nums.forEach(n=>{
let tile=document.createElement("div");
tile.className="tile";
tile.textContent=n;
board.appendChild(tile);
});
}
initPuzzle();

/* Tic Tac Toe */
let current="X";
const ttt=document.getElementById("tttBoard");
for(let i=0;i<9;i++){
let cell=document.createElement("div");
cell.className="tile";
cell.onclick=function(){
if(!cell.textContent){
cell.textContent=current;
current=current==="X"?"O":"X";
}
};
ttt.appendChild(cell);
}

/* Memory Game */
const memory=document.getElementById("memoryBoard");
let cards=["A","A","B","B","C","C","D","D","E"];
cards.sort(()=>Math.random()-0.5);
cards.forEach(c=>{
let card=document.createElement("div");
card.className="tile";
card.textContent="?";
card.onclick=function(){
card.textContent=c;
};
memory.appendChild(card);
});

</script>

</body>
</html>
