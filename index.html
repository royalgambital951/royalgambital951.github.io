<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Gambit</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<!-- Splash -->
<div id="splash">
    <h1>ROYAL GAMBIT</h1>
</div>

<!-- Navbar -->
<header>
    <div class="menu-btn" id="menuBtn">&#9776;</div>
    <div class="logo" id="logoClick">ROYAL GAMBIT</div>
</header>

<!-- Side Menu -->
<div id="sideMenu" class="side-menu">
    <a href="#" onclick="closeGame()">Home</a>
</div>

<!-- Logo Modal -->
<div id="logoModal" class="logo-modal">
    <div class="logo-big">ROYAL GAMBIT</div>
</div>

<!-- Home Section -->
<section id="home">

<h2>Choose Your Game</h2>

<div class="game-list">
    <button onclick="openGame('tictactoe')">Tic Tac Toe</button>
    <button onclick="openGame('snake')">Snake</button>
    <button onclick="openGame('memory')">Memory Game</button>
</div>

</section>

<!-- Game Container -->
<section id="gameSection" style="display:none;">
    <button class="back-btn" onclick="closeGame()">⬅ Back</button>
    <div id="gameArea"></div>
</section>

</body>
</html>
