<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe - Royal Gambit</title>
<link rel="stylesheet" href="style.css">

<style>
.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:8px;
justify-content:center;
margin:25px auto;
}

.cell{
width:100px;
height:100px;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:bold;
cursor:pointer;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.mode-buttons{
margin-top:15px;
}
</style>
</head>
<body>

<header>
<div class="logo-box">
<img src="logo.png" class="logo">
<h1>Royal Gambit</h1>
</div>

<nav>
<a href="index.html">Home</a>
<a href="snake.html">Snake</a>
<a href="puzzle.html">Puzzle</a>
</nav>
</header>

<div class="game-container">

<h2>Tic Tac Toe</h2>

<div class="mode-buttons">
<button onclick="startGame('friend')">Play with Friend</button>
<button onclick="startGame('ai')">Play with Computer (Hard)</button>
</div>

<div class="info">
Time: <span id="timer">0</span>s |
Steps: <span id="steps">0</span>
</div>

<div class="board" id="board"></div>

<div id="result"></div>

<button onclick="restartGame()">Restart</button>
<button onclick="toggleSound()">Sound On / Off</button>

<br><br>
<button onclick="startMusic()">Start Music</button>

<audio id="music" src="music.mp3" loop></audio>

</div>

<script>
let board = document.getElementById("board");
let currentPlayer = "X";
let gameMode = "";
let cells = [];
let steps = 0;
let timer = 0;
let interval;
let music = document.getElementById("music");

function startGame(mode){
gameMode = mode;
board.innerHTML="";
cells = ["","","","","","","","",""];
currentPlayer="X";
steps=0;
timer=0;
document.getElementById("steps").innerText=0;
document.getElementById("timer").innerText=0;
document.getElementById("result").innerText="";
clearInterval(interval);
interval=setInterval(()=>{
timer++;
document.getElementById("timer").innerText=timer;
},1000);

for(let i=0;i<9;i++){
let cell=document.createElement("div");
cell.classList.add("cell");
cell.dataset.index=i;
cell.onclick=handleClick;
board.appendChild(cell);
}
}

function handleClick(){
let index=this.dataset.index;

if(cells[index]!=="" || document.getElementById("result").innerText!=="") return;

cells[index]=currentPlayer;
this.innerText=currentPlayer;
steps++;
document.getElementById("steps").innerText=steps;

if(checkWinner(currentPlayer)){
endGame(currentPlayer+" Wins!");
return;
}

if(cells.every(c=>c!=="")){
endGame("Draw!");
return;
}

if(gameMode==="ai" && currentPlayer==="X"){
currentPlayer="O";
bestMove();
}else{
currentPlayer=currentPlayer==="X"?"O":"X";
}
}

function bestMove(){
let bestScore=-Infinity;
let move;

for(let i=0;i<9;i++){
if(cells[i]===""){
cells[i]="O";
let score=minimax(cells,0,false);
cells[i]="";
if(score>bestScore){
bestScore=score;
move=i;
}
}
}

cells[move]="O";
board.children[move].innerText="O";
steps++;
document.getElementById("steps").innerText=steps;

if(checkWinner("O")){
endGame("Computer Wins!");
return;
}

currentPlayer="X";
}

function minimax(newBoard,depth,isMaximizing){
if(checkWinner("O")) return 10-depth;
if(checkWinner("X")) return depth-10;
if(newBoard.every(c=>c!=="")) return 0;

if(isMaximizing){
let bestScore=-Infinity;
for(let i=0;i<9;i++){
if(newBoard[i]===""){
newBoard[i]="O";
let score=minimax(newBoard,depth+1,false);
newBoard[i]="";
bestScore=Math.max(score,bestScore);
}
}
return bestScore;
}else{
let bestScore=Infinity;
for(let i=0;i<9;i++){
if(newBoard[i]===""){
newBoard[i]="X";
let score=minimax(newBoard,depth+1,true);
newBoard[i]="";
bestScore=Math.min(score,bestScore);
}
}
return bestScore;
}
}

function checkWinner(player){
const wins=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];
return wins.some(combo=>combo.every(i=>cells[i]===player));
}

function endGame(msg){
document.getElementById("result").innerText=msg;
clearInterval(interval);
createConfetti();
}

function restartGame(){
startGame(gameMode);
}

function toggleSound(){
if(music.paused) music.play();
else music.pause();
}

function startMusic(){
music.play();
}

function createConfetti(){
for(let i=0;i<100;i++){
let conf=document.createElement("div");
conf.classList.add("confetti");
conf.style.left=Math.random()*100+"%";
conf.style.background="hsl("+Math.random()*360+",100%,50%)";
document.body.appendChild(conf);
setTimeout(()=>conf.remove(),3000);
}
}
</script>

</body>
</html>
