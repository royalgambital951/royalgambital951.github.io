<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe - Royal Gambit</title>
<link rel="stylesheet" href="style.css">
<style>
.game-container{
text-align:center;
padding:30px;
}

.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:5px;
justify-content:center;
margin:20px auto;
}

.cell{
width:100px;
height:100px;
background:white;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.info{
margin:10px;
font-size:18px;
}

#result{
font-size:30px;
margin:20px;
font-weight:bold;
}

.controls button{
margin:5px;
padding:8px 15px;
}

.confetti{
position:fixed;
width:10px;
height:10px;
background:red;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{transform:translateY(600px);opacity:0;}
}
</style>
</head>
<body>

<header>
<div class="logo-section">
<h1>Royal Gambit</h1>
</div>
<a href="index.html" class="btn">Home</a>
</header>

<div class="game-container">

<h2>Tic Tac Toe</h2>

<div>
<button onclick="startGame('friend')">Play with Friend</button>
<button onclick="startGame('computer')">Play with Computer</button>
</div>

<div class="info">
Time: <span id="timer">0</span>s |
Steps: <span id="steps">0</span>
</div>

<div class="board" id="board"></div>

<div id="result"></div>

<div class="controls">
<button onclick="restart()">Restart</button>
<button onclick="toggleSound()">Sound On/Off</button>
</div>

<audio id="music" src="music.mp3" loop></audio>

</div>

<script>
let board = document.getElementById("board");
let cells = [];
let currentPlayer = "X";
let mode = "";
let steps = 0;
let timer = 0;
let interval;
let music = document.getElementById("music");

function startGame(selectedMode){
mode = selectedMode;
board.innerHTML="";
cells=[];
steps=0;
timer=0;
document.getElementById("steps").innerText=0;
document.getElementById("timer").innerText=0;
document.getElementById("result").innerText="";
clearInterval(interval);
interval=setInterval(()=>{
timer++;
document.getElementById("timer").innerText=timer;
},1000);

music.play();

for(let i=0;i<9;i++){
let cell=document.createElement("div");
cell.classList.add("cell");
cell.dataset.index=i;
cell.onclick=handleClick;
board.appendChild(cell);
cells.push("");
}
}

function handleClick(){
let index=this.dataset.index;
if(cells[index]!=="" || document.getElementById("result").innerText!=="") return;

cells[index]=currentPlayer;
this.innerText=currentPlayer;
steps++;
document.getElementById("steps").innerText=steps;

if(checkWin()){
endGame(currentPlayer+" Wins!");
return;
}

if(cells.every(c=>c!=="")){
endGame("Draw!");
return;
}

if(mode==="computer" && currentPlayer==="X"){
currentPlayer="O";
computerMove();
}else{
currentPlayer=currentPlayer==="X"?"O":"X";
}
}

function computerMove(){
let empty=cells.map((v,i)=>v===""?i:null).filter(v=>v!==null);
let move=empty[Math.floor(Math.random()*empty.length)];
cells[move]="O";
board.children[move].innerText="O";
steps++;
document.getElementById("steps").innerText=steps;

if(checkWin()){
endGame("Computer Wins!");
return;
}

currentPlayer="X";
}

function checkWin(){
let wins=[[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]];
return wins.some(combo=>{
return combo.every(i=>cells[i]===currentPlayer);
});
}

function endGame(msg){
document.getElementById("result").innerText=msg;
clearInterval(interval);
createConfetti();
}

function restart(){
startGame(mode);
}

function toggleSound(){
if(music.paused) music.play();
else music.pause();
}

function createConfetti(){
for(let i=0;i<100;i++){
let conf=document.createElement("div");
conf.classList.add("confetti");
conf.style.left=Math.random()*100+"%";
conf.style.background="hsl("+Math.random()*360+",100%,50%)";
document.body.appendChild(conf);
setTimeout(()=>conf.remove(),3000);
}
}
</script>

</body>
</html>
