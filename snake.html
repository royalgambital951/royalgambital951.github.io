<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game - Royal Gambit</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<div class="logo-box">
<img src="logo.png" class="logo">
<h1>Royal Gambit</h1>
</div>

<nav>
<a href="index.html">Home</a>
<a href="tictactoe.html">Tic Tac Toe</a>
<a href="snake.html">Snake</a>
<a href="puzzle.html">Puzzle</a>
</nav>
</header>

<section class="game-section">

<h2>Snake Game</h2>

<div class="game-info">
<span>Score: <span id="score">0</span></span>
<span>Time: <span id="timer">0</span>s</span>
</div>

<canvas id="gameCanvas" width="400" height="400"></canvas>

<div class="controls">
<button onclick="restartGame()">Restart</button>
<button onclick="toggleSound()">🔊 Sound</button>
</div>

<!-- Mobile Controls -->
<div class="mobile-controls">
<button onclick="changeDirection('up')">⬆</button>
<div>
<button onclick="changeDirection('left')">⬅</button>
<button onclick="changeDirection('down')">⬇</button>
<button onclick="changeDirection('right')">➡</button>
</div>
</div>

</section>

<footer>
<p>© 2025 Royal Gambit</p>
</footer>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let box = 20;
let snake = [{x: 200, y: 200}];
let food = randomFood();
let direction = "RIGHT";
let score = 0;
let timer = 0;
let soundOn = true;
let game;

const eatSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-game-ball-tap-2073.mp3");

function randomFood() {
return {
x: Math.floor(Math.random()*20)*box,
y: Math.floor(Math.random()*20)*box
};
}

function draw() {
ctx.fillStyle = "#f5f5f5";
ctx.fillRect(0,0,400,400);

for(let i=0;i<snake.length;i++){
ctx.fillStyle = i==0 ? "#222" : "#777";
ctx.fillRect(snake[i].x, snake[i].y, box, box);
}

ctx.fillStyle = "gold";
ctx.fillRect(food.x, food.y, box, box);

let headX = snake[0].x;
let headY = snake[0].y;

if(direction=="LEFT") headX -= box;
if(direction=="RIGHT") headX += box;
if(direction=="UP") headY -= box;
if(direction=="DOWN") headY += box;

if(headX==food.x && headY==food.y){
score++;
document.getElementById("score").innerText = score;
food = randomFood();
if(soundOn) eatSound.play();
}else{
snake.pop();
}

let newHead = {x: headX, y: headY};

if(headX<0 || headY<0 || headX>=400 || headY>=400 || collision(newHead,snake)){
clearInterval(game);
alert("Game Over! Score: "+score);
}

snake.unshift(newHead);
}

function collision(head,array){
for(let i=0;i<array.length;i++){
if(head.x==array[i].x && head.y==array[i].y) return true;
}
return false;
}

document.addEventListener("keydown",function(e){
if(e.key=="ArrowLeft" && direction!="RIGHT") direction="LEFT";
if(e.key=="ArrowUp" && direction!="DOWN") direction="UP";
if(e.key=="ArrowRight" && direction!="LEFT") direction="RIGHT";
if(e.key=="ArrowDown" && direction!="UP") direction="DOWN";
});

function changeDirection(dir){
if(dir=="left" && direction!="RIGHT") direction="LEFT";
if(dir=="up" && direction!="DOWN") direction="UP";
if(dir=="right" && direction!="LEFT") direction="RIGHT";
if(dir=="down" && direction!="UP") direction="DOWN";
}

function restartGame(){
snake = [{x:200,y:200}];
direction="RIGHT";
score=0;
timer=0;
document.getElementById("score").innerText=0;
document.getElementById("timer").innerText=0;
food=randomFood();
clearInterval(game);
game=setInterval(draw,120);
}

function toggleSound(){
soundOn=!soundOn;
alert(soundOn?"Sound On":"Sound Off");
}

setInterval(()=>{
timer++;
document.getElementById("timer").innerText=timer;
},1000);

game=setInterval(draw,120);
</script>

</body>
</html>
