<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <style>
    body {
      text-align: center;
      background: linear-gradient(to right, #f5f0e6, #e8d8c3);
      font-family: Arial;
    }

    h1 {
      color: brown;
    }

    canvas {
      background: white;
      display: block;
      margin: 20px auto;
      border: 3px solid brown;
    }

    .controls button {
      margin: 5px;
      padding: 10px 15px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      background: crimson;
      color: white;
    }
  </style>
</head>

<body>

<h1>Snake Game</h1>

<canvas id="gameCanvas" width="400" height="400"></canvas>

<div class="controls">
  <button onclick="setDirection('UP')">⬆</button><br>
  <button onclick="setDirection('LEFT')">⬅</button>
  <button onclick="setDirection('DOWN')">⬇</button>
  <button onclick="setDirection('RIGHT')">➡</button>
</div>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const box = 20;
let snake = [{x: 200, y: 200}];
let direction = null;

let food = {
  x: Math.floor(Math.random()*20)*box,
  y: Math.floor(Math.random()*20)*box
};

function setDirection(dir) {
  direction = dir;
}

function draw() {

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,0,400,400);

  for(let i=0;i<snake.length;i++){
    ctx.fillStyle = i===0 ? "green" : "lightgreen";
    ctx.fillRect(snake[i].x, snake[i].y, box, box);
  }

  ctx.fillStyle="red";
  ctx.fillRect(food.x, food.y, box, box);

  if(direction==null) return;

  let snakeX = snake[0].x;
  let snakeY = snake[0].y;

  if(direction=="LEFT") snakeX-=box;
  if(direction=="RIGHT") snakeX+=box;
  if(direction=="UP") snakeY-=box;
  if(direction=="DOWN") snakeY+=box;

  if(snakeX<0||snakeY<0||snakeX>=400||snakeY>=400){
    alert("Game Over");
    location.reload();
  }

  if(snakeX==food.x && snakeY==food.y){
    food={
      x:Math.floor(Math.random()*20)*box,
      y:Math.floor(Math.random()*20)*box
    }
  }else{
    snake.pop();
  }

  snake.unshift({x:snakeX,y:snakeY});
}

setInterval(draw,150);

</script>

</body>
</html>
