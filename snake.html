<!DOCTYPE html>
<html>
<head>
<title>Snake Game</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body onload="initSnake(); startGame();">

<div class="game-header">
  <div id="timer">Time: 0s</div>
  <div id="steps">Steps: 0</div>
  <div class="settings" onclick="toggleSound()">🔊</div>
</div>

<canvas id="snakeCanvas" width="400" height="400"></canvas>

<div class="controls">
  <button onclick="setDir('up')">⬆️</button><br>
  <button onclick="setDir('left')">⬅️</button>
  <button onclick="setDir('right')">➡️</button><br>
  <button onclick="setDir('down')">⬇️</button>
</div>

<div id="winScreen" class="win-screen"></div>

<script src="js/main.js"></script>
<script src="js/snake.js"></script>
</body>
</html>
