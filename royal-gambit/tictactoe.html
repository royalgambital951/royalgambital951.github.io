<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe - Royal Gambit</title>
<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>
<style>
.grid{display:grid;grid-template-columns:repeat(3,100px);gap:5px;justify-content:center;}
.cell{width:100px;height:100px;font-size:40px;background:#ddd;text-align:center;line-height:100px;cursor:pointer;}
</style>
</head>
<body onload="startTimer();playMusic()">

<header>
<h2>Tic Tac Toe</h2>
<button onclick="toggleMode()">Toggle</button>
</header>

<div class="game-info">
<div>Timer: <span id="timer">0</span></div>
<div>Moves: <span id="steps">0</span></div>
<button onclick="location.reload()">Restart</button>
</div>

<div class="grid" id="board"></div>
<audio id="bg-music" src="assets/bg-music.mp3" loop></audio>

<script>
let board=document.getElementById("board");
let cells=[];
let player="X";
let moves=0;

for(let i=0;i<9;i++){
let cell=document.createElement("div");
cell.className="cell";
cell.onclick=()=>move(cell,i);
board.appendChild(cell);
cells.push("");
}

function move(cell,i){
if(cells[i]!="")return;
cell.innerText=player;
cells[i]=player;
moves++;
document.getElementById("steps").innerText=moves;
checkWin();
player=player=="X"?"O":"X";
}

function checkWin(){
let wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
wins.forEach(w=>{
if(cells[w[0]]&&cells[w[0]]==cells[w[1]]&&cells[w[1]]==cells[w[2]]){
alert("WINNER: "+cells[w[0]]);
launchConfetti();
stopTimer();
stopMusic();
}
});
}
</script>

</body>
</html>
