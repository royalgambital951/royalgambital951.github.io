<!DOCTYPE html>
<html>
<head>
<title>Snake - Royal Gambit</title>
<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>
</head>
<body onload="startGame()">

<header>
<h2>Snake Game 🐍</h2>
<button onclick="toggleMode()">Toggle</button>
</header>

<div class="game-info">
<div>Timer: <span id="timer">0</span></div>
<div>Steps: <span id="steps">0</span></div>
<button onclick="location.reload()">Restart</button>
</div>

<canvas id="game" width="400" height="400"></canvas>

<audio id="bg-music" src="assets/bg-music.mp3" loop></audio>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");
let snake = [{x:200,y:200}];
let food = {x:100,y:100};
let dx=20, dy=0;
let steps=0;

function startGame(){
startTimer();
playMusic();
setInterval(draw,150);
}

function draw(){
ctx.clearRect(0,0,400,400);
ctx.fillStyle="lime";
snake.forEach(p=>ctx.fillRect(p.x,p.y,20,20));
ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,20,20);

let head={x:snake[0].x+dx,y:snake[0].y+dy};
snake.unshift(head);
snake.pop();

steps++;
document.getElementById("steps").innerText=steps;

if(head.x==food.x && head.y==food.y){
food={x:Math.floor(Math.random()*20)*20,y:Math.floor(Math.random()*20)*20};
snake.push({});
}

if(head.x<0||head.x>=400||head.y<0||head.y>=400){
alert("WINNER");
launchConfetti();
stopTimer();
stopMusic();
}
}

document.addEventListener("keydown",e=>{
if(e.key=="ArrowUp"){dx=0;dy=-20;}
if(e.key=="ArrowDown"){dx=0;dy=20;}
if(e.key=="ArrowLeft"){dx=-20;dy=0;}
if(e.key=="ArrowRight"){dx=20;dy=0;}
});
</script>

</body>
</html>
