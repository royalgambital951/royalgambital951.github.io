<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hard Puzzle - Royal Gambit</title>
<link rel="stylesheet" href="style.css">

<style>
.puzzle-board{
width:300px;
display:grid;
grid-template-columns:repeat(3,100px);
gap:6px;
margin:30px auto;
}

.tile{
width:100px;
height:100px;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
cursor:pointer;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.2s;
}

.tile:hover{
background:#e8eaf6;
}

.empty{
background:#ddd;
cursor:default;
}

.game-info{
display:flex;
justify-content:center;
gap:25px;
font-size:18px;
margin-top:15px;
}

.win-message{
font-size:26px;
color:#1a237e;
margin-top:15px;
font-weight:bold;
}
</style>
</head>
<body>

<header>
<div class="logo-box">
<img src="logo.png" class="logo">
<h1>Royal Gambit</h1>
</div>

<nav>
<a href="index.html">Home</a>
<a href="tictactoe.html">Tic Tac Toe</a>
<a href="snake.html">Snake</a>
<a href="puzzle.html">Puzzle</a>
</nav>
</header>

<section class="game-section">

<h2>Hard Puzzle</h2>

<div class="game-info">
<span>Steps: <span id="steps">0</span></span>
<span>Time: <span id="timer">0</span>s</span>
</div>

<div class="puzzle-board" id="board"></div>

<button onclick="restartGame()">Restart</button>

<div class="win-message" id="winMessage"></div>

</section>

<footer>
<p>© 2025 Royal Gambit</p>
</footer>

<script>
let board = document.getElementById("board");
let tiles = [];
let steps = 0;
let timer = 0;
let timerInterval;

function initGame(){
tiles = [1,2,3,4,5,6,7,8,""];
shuffle(tiles);
steps=0;
timer=0;
document.getElementById("steps").innerText=0;
document.getElementById("timer").innerText=0;
document.getElementById("winMessage").innerText="";
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
timer++;
document.getElementById("timer").innerText=timer;
},1000);
renderBoard();
}

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

function renderBoard(){
board.innerHTML="";
tiles.forEach((num,index)=>{
let tile=document.createElement("div");
tile.classList.add("tile");
if(num===""){
tile.classList.add("empty");
}else{
tile.innerText=num;
tile.onclick=()=>moveTile(index);
}
board.appendChild(tile);
});
}

function moveTile(index){
let emptyIndex=tiles.indexOf("");
let validMoves=[index-1,index+1,index-3,index+3];

if(validMoves.includes(emptyIndex)){
[tiles[index],tiles[emptyIndex]]=[tiles[emptyIndex],tiles[index]];
steps++;
document.getElementById("steps").innerText=steps;
renderBoard();
checkWin();
}
}

function checkWin(){
if(JSON.stringify(tiles)===JSON.stringify([1,2,3,4,5,6,7,8,""])){
clearInterval(timerInterval);
document.getElementById("winMessage").innerText="🎉 You Solved It!";
createConfetti();
}
}

function restartGame(){
initGame();
}

function createConfetti(){
for(let i=0;i<80;i++){
let conf=document.createElement("div");
conf.classList.add("confetti");
conf.style.left=Math.random()*100+"%";
conf.style.background="hsl("+Math.random()*360+",100%,50%)";
document.body.appendChild(conf);
setTimeout(()=>conf.remove(),3000);
}
}

initGame();
</script>

</body>
</html>
